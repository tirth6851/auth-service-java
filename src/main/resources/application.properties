spring.application.name=auth-platform
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - dev uses ddl-auto, not Flyway migrations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.enabled=false

spring.h2.console.enabled=false

# JWT - HS256 requires >=32 char secret
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=3600000

# Actuator - Health check endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Serialize dates as ISO 8601 strings, not epoch timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# Rate limiting - /auth/login (10 attempts per 10 minutes per IP)
app.ratelimit.login.capacity=10
app.ratelimit.login.refill-period-seconds=600
