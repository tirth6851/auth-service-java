spring.application.name=auth-platform
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - dev uses ddl-auto, not Flyway migrations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.enabled=false

spring.h2.console.enabled=false

# JWT - HS256 requires >=32 char secret
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=3600000

# Actuator - Health check endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Refresh token TTL (default 7 days in ms; production: reduce access token to 900000)
app.refresh-token.ttl-ms=604800000

# CORS - comma-separated allowed origins (override per environment)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Jackson - ISO 8601 date format for Instant serialization
spring.jackson.serialization.write-dates-as-timestamps=false
