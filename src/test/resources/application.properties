spring.application.name=auth-platform
server.port=8080

spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.enabled=false

spring.h2.console.enabled=false

app.jwt.secret=test-secret-key-for-unit-tests-only-32ch
app.jwt.expiration-ms=3600000

# Rate limiting - low capacity so tests can trigger 429 in 3+1 attempts
app.ratelimit.login.capacity=3
app.ratelimit.login.refill-period-seconds=600
